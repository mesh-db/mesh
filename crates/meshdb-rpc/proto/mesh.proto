syntax = "proto3";

package mesh;

// 16-byte UUIDv7 wrapped in a length-delimited bytes field.
message UuidBytes {
  bytes value = 1;
}

// Marker for the Null variant of Property.
message NullValue {}

// Spatial point variant of Property. Mirrors `meshdb_core::Point` —
// an EPSG SRID tag plus raw `x`/`y` coordinates, with `z` present iff
// the point is 3D. Callers are expected to keep `z.is_some()` in sync
// with the SRID's dimensionality (7203/4326 → 2D, 9157/4979 → 3D).
message PointValue {
  int32 srid = 1;
  double x = 2;
  double y = 3;
  optional double z = 4;
}

// DateTime with timezone offset. `nanos` in `meshdb_core::Property`
// is `i128` UTC epoch-nanoseconds; to fit protobuf we split it into
// `(seconds, subsec_nanos)` following the Bolt DateTime convention —
// the encoder in meshdb-server does the same split for tag 0x49.
// `tz_offset_secs` and `tz_name` are both optional, matching the
// Rust type's `Option<i32>` / `Option<String>`.
message DateTimeValue {
  sint64 seconds = 1;
  int32 subsec_nanos = 2;
  optional int32 tz_offset_secs = 3;
  optional string tz_name = 4;
}

// Naive (no-timezone) datetime — UTC epoch nanos split the same way
// as `DateTimeValue`. Distinct variant so the zone-less presentation
// semantics are preserved across the wire.
message LocalDateTimeValue {
  sint64 seconds = 1;
  int32 subsec_nanos = 2;
}

// Days since the UNIX epoch (1970-01-01). `sint64` so negative days
// (pre-epoch dates) round-trip without the zig-zag overhead landing
// on a varint-costly payload.
message DateValue {
  sint64 days = 1;
}

// Time of day with optional zone offset. `nanos` is since midnight.
message TimeValue {
  int64 nanos = 1;
  optional int32 tz_offset_secs = 2;
}

// Cypher Duration (months, days, seconds, subsec nanos). Calendar
// units and exact units are kept separate since only the exact
// units can be reduced without a reference date.
message DurationValue {
  int64 months = 1;
  int64 days = 2;
  int64 seconds = 3;
  int32 nanos = 4;
}

// Ordered, heterogeneous list of Property values. Self-referential
// — the values themselves are Property, so nested lists and maps
// round-trip without flattening.
message ListValue {
  repeated Property values = 1;
}

// String-keyed map of Property values. Self-referential for the
// same reason as `ListValue`.
message MapValue {
  map<string, Property> entries = 1;
}

// Full Property surface — covers every `meshdb_core::Property`
// variant, so cross-peer traffic no longer needs a fallback.
message Property {
  oneof kind {
    NullValue null_val = 1;
    string string_val = 2;
    int64 int_val = 3;
    double float_val = 4;
    bool bool_val = 5;
    PointValue point_val = 6;
    DateTimeValue datetime_val = 7;
    LocalDateTimeValue local_datetime_val = 8;
    DateValue date_val = 9;
    TimeValue time_val = 10;
    DurationValue duration_val = 11;
    ListValue list_val = 12;
    MapValue map_val = 13;
  }
}

message Node {
  UuidBytes id = 1;
  repeated string labels = 2;
  map<string, Property> properties = 3;
}

message Edge {
  UuidBytes id = 1;
  string edge_type = 2;
  UuidBytes source = 3;
  UuidBytes target = 4;
  map<string, Property> properties = 5;
}

// (edge_id, neighbor_id) pair returned by adjacency lookups.
message NeighborInfo {
  UuidBytes edge_id = 1;
  UuidBytes neighbor_id = 2;
}

// Read-only query service.
service MeshQuery {
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
  rpc GetEdge(GetEdgeRequest) returns (GetEdgeResponse);
  rpc NodesByLabel(NodesByLabelRequest) returns (NodesByLabelResponse);
  // Equality lookup through a property index. The routing-mode
  // partitioned reader scatter-gathers this across every peer and
  // unions the results; each peer answers from its local index CF.
  rpc NodesByProperty(NodesByPropertyRequest) returns (NodesByPropertyResponse);
  // Relationship-scope analogue of NodesByProperty. Scatter-gathered
  // by the routing-mode partitioned reader the same way; each peer
  // answers from its local edge-property index CF. Callers must
  // verify the `(edge_type, property)` index is registered before
  // dispatching — a missing index returns an empty result.
  rpc EdgesByProperty(EdgesByPropertyRequest) returns (EdgesByPropertyResponse);
  rpc AllNodeIds(AllNodeIdsRequest) returns (AllNodeIdsResponse);
  rpc Outgoing(NeighborRequest) returns (NeighborResponse);
  rpc Incoming(NeighborRequest) returns (NeighborResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
  // Parse + plan + execute a Cypher query. Mutating clauses (CREATE, SET,
  // DELETE) route through Raft when the server is running in cluster mode,
  // so the executor's writes replicate to every replica via the same
  // commit path as direct gRPC writes.
  rpc ExecuteCypher(ExecuteCypherRequest) returns (ExecuteCypherResponse);
}

message GetNodeRequest {
  UuidBytes id = 1;
  // When true, the server answers only from its local store and does not
  // forward to the partition owner. Used by the partitioned reader to issue
  // direct point reads against a specific peer.
  bool local_only = 2;
}
message GetNodeResponse {
  bool found = 1;
  Node node = 2;
}

message AllNodeIdsRequest {
  // When true, the server returns only node ids on its local store and does
  // not scatter-gather to other peers.
  bool local_only = 1;
}
message AllNodeIdsResponse { repeated UuidBytes ids = 1; }

message GetEdgeRequest {
  UuidBytes id = 1;
  // When true, the server answers only from its local store and does not
  // scatter-gather to other peers. Routed clients set this to false; servers
  // forwarding a scatter-gather hop set this to true on the forwarded request.
  bool local_only = 2;
}
message GetEdgeResponse {
  bool found = 1;
  Edge edge = 2;
}

message NodesByLabelRequest {
  string label = 1;
  bool local_only = 2;
}
message NodesByLabelResponse { repeated UuidBytes ids = 1; }

message NodesByPropertyRequest {
  string label = 1;
  string property = 2;
  // serde_json-encoded `mesh_core::Property`. JSON keeps the proto
  // out of the recursive Property schema; the routing-mode client
  // encodes the value once per scatter-gather and reuses the blob
  // across every peer call.
  bytes value_json = 3;
  bool local_only = 4;
}
message NodesByPropertyResponse { repeated UuidBytes ids = 1; }

message EdgesByPropertyRequest {
  string edge_type = 1;
  string property = 2;
  // Same JSON-encoding trick as NodesByPropertyRequest.value_json —
  // one encode per scatter, reused across every peer call.
  bytes value_json = 3;
  bool local_only = 4;
}
message EdgesByPropertyResponse { repeated UuidBytes ids = 1; }

message NeighborRequest {
  UuidBytes node_id = 1;
  // When true, the server answers only from its local store and does not
  // forward to the partition owner.
  bool local_only = 2;
}
message NeighborResponse { repeated NeighborInfo neighbors = 1; }

message HealthRequest {}
message HealthResponse {
  bool serving = 1;
}

message ExecuteCypherRequest {
  string query = 1;
  // serde_json-encoded HashMap<String, mesh_executor::Value>. Carries
  // the driver-supplied `$param` bindings for parameterized Cypher
  // queries. Empty / missing → no parameters. JSON keeps us out of
  // proto schema design for the recursive Value type; the same trick
  // is used by `rows_json` in the response.
  bytes params_json = 2;
}

// Rows carried as a single JSON blob (serde-serialized Vec<mesh_executor::Row>).
// A typed proto Value is deferred until the row shape stabilizes.
message ExecuteCypherResponse {
  bytes rows_json = 1;
}

// Mutations. Writes for a node are routed to the partition owner; writes for
// an edge land on both the source's owner and the target's owner so each
// peer's local adjacency is complete for the nodes it owns.
service MeshWrite {
  rpc PutNode(PutNodeRequest) returns (PutNodeResponse);
  rpc PutEdge(PutEdgeRequest) returns (PutEdgeResponse);
  rpc DeleteEdge(DeleteEdgeRequest) returns (DeleteEdgeResponse);
  rpc DetachDeleteNode(DetachDeleteNodeRequest) returns (DetachDeleteNodeResponse);
  // Two-phase commit batch apply. A Cypher coordinator groups a multi-op
  // transaction's writes by destination peer, sends PREPARE to every
  // peer, then sends COMMIT iff all PREPAREs acked — otherwise ABORT.
  // Each peer stages the PREPARE in memory and applies it atomically
  // through one rocksdb WriteBatch at COMMIT time.
  rpc BatchWrite(BatchWriteRequest) returns (BatchWriteResponse);
  // Apply a property-index creation to this peer's local store.
  // Used by the routing-mode DDL fan-out: the receiving peer runs
  // its local create, then calls this RPC on every other peer in
  // parallel. Idempotent — re-creating an existing index is a
  // no-op at the store layer.
  rpc CreatePropertyIndex(CreatePropertyIndexRequest) returns (CreatePropertyIndexResponse);
  // Tear down a property index on this peer's local store. Mirrors
  // `CreatePropertyIndex`: used as both the user-initiated DROP
  // fan-out and the compensating rollback for a partial create.
  rpc DropPropertyIndex(DropPropertyIndexRequest) returns (DropPropertyIndexResponse);
  // Relationship-scope analogue of `CreatePropertyIndex`. Installs
  // a `(edge_type, property)` edge property index on this peer's
  // local store. Fan-out and idempotency semantics match the node
  // variant — each peer runs its own backfill against its local
  // edges, so a partial create surfaces as a per-peer error that
  // triggers rollback on the leader.
  rpc CreateEdgePropertyIndex(CreateEdgePropertyIndexRequest)
      returns (CreateEdgePropertyIndexResponse);
  // Tear down an edge property index on this peer's local store.
  // Mirrors `CreateEdgePropertyIndex` — used for both user-initiated
  // DROP fan-out and the compensating rollback for a partial create.
  rpc DropEdgePropertyIndex(DropEdgePropertyIndexRequest)
      returns (DropEdgePropertyIndexResponse);
  // Apply a constraint creation to this peer's local store. Used by
  // the routing-mode DDL fan-out the same way `CreatePropertyIndex`
  // is — leader applies locally, then calls this RPC on every other
  // peer in parallel. Backfill validation runs per peer against the
  // local graph; any violation surfaces as a gRPC error and triggers
  // rollback on the leader.
  rpc CreatePropertyConstraint(CreatePropertyConstraintRequest)
      returns (CreatePropertyConstraintResponse);
  // Tear down a constraint on this peer's local store. Mirrors
  // `CreatePropertyConstraint` — used for user-initiated DROP
  // fan-out and for rollback of a partial create.
  rpc DropPropertyConstraint(DropPropertyConstraintRequest)
      returns (DropPropertyConstraintResponse);
}

enum BatchPhase {
  BATCH_PHASE_UNSPECIFIED = 0;
  BATCH_PHASE_PREPARE = 1;
  BATCH_PHASE_COMMIT = 2;
  BATCH_PHASE_ABORT = 3;
}

message BatchWriteRequest {
  // Unique id for this transaction — generated by the coordinator and
  // reused across the PREPARE / COMMIT / ABORT calls for a given batch.
  string txid = 1;
  BatchPhase phase = 2;
  // serde-json-serialized Vec<mesh_cluster::GraphCommand>. Only set on
  // PREPARE requests; ignored for COMMIT / ABORT.
  bytes commands_json = 3;
}

message BatchWriteResponse {}

message PutNodeRequest {
  Node node = 1;
  bool local_only = 2;
}
message PutNodeResponse {}

message PutEdgeRequest {
  Edge edge = 1;
  bool local_only = 2;
}
message PutEdgeResponse {}

message DeleteEdgeRequest {
  UuidBytes edge_id = 1;
  bool local_only = 2;
}
message DeleteEdgeResponse {}

message DetachDeleteNodeRequest {
  UuidBytes node_id = 1;
  bool local_only = 2;
}
message DetachDeleteNodeResponse {}

message CreatePropertyIndexRequest {
  string label = 1;
  string property = 2;
}
message CreatePropertyIndexResponse {}

message DropPropertyIndexRequest {
  string label = 1;
  string property = 2;
}
message DropPropertyIndexResponse {}

message CreateEdgePropertyIndexRequest {
  string edge_type = 1;
  string property = 2;
}
message CreateEdgePropertyIndexResponse {}

message DropEdgePropertyIndexRequest {
  string edge_type = 1;
  string property = 2;
}
message DropEdgePropertyIndexResponse {}

// Mirrors `meshdb_cluster::ConstraintKind`. New kinds land as
// additional enum values so existing peers can reject unknown kinds
// rather than silently misapplying. `PROPERTY_TYPE` pairs with a
// separate `PropertyTypeKind` field on the request that identifies
// the target type.
enum ConstraintKind {
  CONSTRAINT_KIND_UNSPECIFIED = 0;
  CONSTRAINT_KIND_UNIQUE = 1;
  CONSTRAINT_KIND_NOT_NULL = 2;
  CONSTRAINT_KIND_PROPERTY_TYPE = 3;
  CONSTRAINT_KIND_NODE_KEY = 4;
}

// Target-type sub-enum for `IS :: <TYPE>` constraints. Only
// meaningful when `kind == PROPERTY_TYPE`; ignored otherwise. Kept
// separate from `ConstraintKind` so the top-level enum doesn't
// explode into one variant per type.
enum PropertyTypeKind {
  PROPERTY_TYPE_KIND_UNSPECIFIED = 0;
  PROPERTY_TYPE_KIND_STRING = 1;
  PROPERTY_TYPE_KIND_INTEGER = 2;
  PROPERTY_TYPE_KIND_FLOAT = 3;
  PROPERTY_TYPE_KIND_BOOLEAN = 4;
}

// Scope a constraint applies to. `NODE` uses `scope_target` as a
// label; `RELATIONSHIP` uses it as an edge type.
enum ConstraintScopeKind {
  CONSTRAINT_SCOPE_KIND_UNSPECIFIED = 0;
  CONSTRAINT_SCOPE_KIND_NODE = 1;
  CONSTRAINT_SCOPE_KIND_RELATIONSHIP = 2;
}

message CreatePropertyConstraintRequest {
  // Optional user-supplied name. Empty string represents `None`;
  // the receiver resolves the auto-generated default deterministically
  // from `(scope, properties, kind)` so every peer ends up with the
  // same final name.
  string name = 1;
  // `scope_kind` plus `scope_target` together identify the target.
  // Replaces the old `label` field so relationship scopes share the
  // same shape.
  ConstraintScopeKind scope_kind = 2;
  string scope_target = 7;
  // Non-empty property list. Single-property kinds carry a one-
  // element list; `NODE_KEY` carries the full tuple.
  repeated string properties = 3;
  ConstraintKind kind = 4;
  bool if_not_exists = 5;
  // Only meaningful when `kind == CONSTRAINT_KIND_PROPERTY_TYPE`.
  // Ignored for UNIQUE / NOT NULL / NODE_KEY.
  PropertyTypeKind property_type = 6;
}
message CreatePropertyConstraintResponse {}

message DropPropertyConstraintRequest {
  string name = 1;
  bool if_exists = 2;
}
message DropPropertyConstraintResponse {}

// Raft consensus RPCs. Each payload field carries a serde-serialized openraft
// request/response struct, so the wire schema stays stable even as openraft's
// internal types evolve and we don't have to mirror every internal field in
// proto.
service MeshRaft {
  rpc AppendEntries(RaftRpcRequest) returns (RaftRpcResponse);
  rpc Vote(RaftRpcRequest) returns (RaftRpcResponse);
  rpc InstallSnapshot(RaftRpcRequest) returns (RaftRpcResponse);
}

message RaftRpcRequest {
  bytes payload = 1;
}

message RaftRpcResponse {
  bytes payload = 1;
}
