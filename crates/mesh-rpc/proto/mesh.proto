syntax = "proto3";

package mesh;

// 16-byte UUIDv7 wrapped in a length-delimited bytes field.
message UuidBytes {
  bytes value = 1;
}

// Marker for the Null variant of Property.
message NullValue {}

// Primitive property value. List / Map variants are deferred.
message Property {
  oneof kind {
    NullValue null_val = 1;
    string string_val = 2;
    int64 int_val = 3;
    double float_val = 4;
    bool bool_val = 5;
  }
}

message Node {
  UuidBytes id = 1;
  repeated string labels = 2;
  map<string, Property> properties = 3;
}

message Edge {
  UuidBytes id = 1;
  string edge_type = 2;
  UuidBytes source = 3;
  UuidBytes target = 4;
  map<string, Property> properties = 5;
}

// (edge_id, neighbor_id) pair returned by adjacency lookups.
message NeighborInfo {
  UuidBytes edge_id = 1;
  UuidBytes neighbor_id = 2;
}

// Read-only query service.
service MeshQuery {
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
  rpc GetEdge(GetEdgeRequest) returns (GetEdgeResponse);
  rpc NodesByLabel(NodesByLabelRequest) returns (NodesByLabelResponse);
  rpc Outgoing(NeighborRequest) returns (NeighborResponse);
  rpc Incoming(NeighborRequest) returns (NeighborResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
  // Parse + plan + execute a Cypher query. Mutating clauses (CREATE, SET,
  // DELETE) route through Raft when the server is running in cluster mode,
  // so the executor's writes replicate to every replica via the same
  // commit path as direct gRPC writes.
  rpc ExecuteCypher(ExecuteCypherRequest) returns (ExecuteCypherResponse);
}

message GetNodeRequest { UuidBytes id = 1; }
message GetNodeResponse {
  bool found = 1;
  Node node = 2;
}

message GetEdgeRequest {
  UuidBytes id = 1;
  // When true, the server answers only from its local store and does not
  // scatter-gather to other peers. Routed clients set this to false; servers
  // forwarding a scatter-gather hop set this to true on the forwarded request.
  bool local_only = 2;
}
message GetEdgeResponse {
  bool found = 1;
  Edge edge = 2;
}

message NodesByLabelRequest {
  string label = 1;
  bool local_only = 2;
}
message NodesByLabelResponse { repeated UuidBytes ids = 1; }

message NeighborRequest { UuidBytes node_id = 1; }
message NeighborResponse { repeated NeighborInfo neighbors = 1; }

message HealthRequest {}
message HealthResponse {
  bool serving = 1;
}

message ExecuteCypherRequest {
  string query = 1;
}

// Rows carried as a single JSON blob (serde-serialized Vec<mesh_executor::Row>).
// A typed proto Value is deferred until the row shape stabilizes.
message ExecuteCypherResponse {
  bytes rows_json = 1;
}

// Mutations. Writes for a node are routed to the partition owner; writes for
// an edge land on both the source's owner and the target's owner so each
// peer's local adjacency is complete for the nodes it owns.
service MeshWrite {
  rpc PutNode(PutNodeRequest) returns (PutNodeResponse);
  rpc PutEdge(PutEdgeRequest) returns (PutEdgeResponse);
  rpc DeleteEdge(DeleteEdgeRequest) returns (DeleteEdgeResponse);
  rpc DetachDeleteNode(DetachDeleteNodeRequest) returns (DetachDeleteNodeResponse);
}

message PutNodeRequest {
  Node node = 1;
  bool local_only = 2;
}
message PutNodeResponse {}

message PutEdgeRequest {
  Edge edge = 1;
  bool local_only = 2;
}
message PutEdgeResponse {}

message DeleteEdgeRequest {
  UuidBytes edge_id = 1;
  bool local_only = 2;
}
message DeleteEdgeResponse {}

message DetachDeleteNodeRequest {
  UuidBytes node_id = 1;
  bool local_only = 2;
}
message DetachDeleteNodeResponse {}

// Raft consensus RPCs. Each payload field carries a serde-serialized openraft
// request/response struct, so the wire schema stays stable even as openraft's
// internal types evolve and we don't have to mirror every internal field in
// proto.
service MeshRaft {
  rpc AppendEntries(RaftRpcRequest) returns (RaftRpcResponse);
  rpc Vote(RaftRpcRequest) returns (RaftRpcResponse);
  rpc InstallSnapshot(RaftRpcRequest) returns (RaftRpcResponse);
}

message RaftRpcRequest {
  bytes payload = 1;
}

message RaftRpcResponse {
  bytes payload = 1;
}
