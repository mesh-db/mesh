name: Release-plz

on:
  push:
    branches: [main]
  # Surfaces a "Run workflow" button in the Actions tab. Both jobs are
  # idempotent — release-pr refreshes the Release PR, release publishes
  # any crate versions not yet on crates.io. Safe to click whenever.
  workflow_dispatch:

# Never cancel an in-flight release — doing so mid-publish can leave
# some crates on crates.io at the new version and others at the old.
concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

env:
  # Pin the release-plz binary version so CI stays reproducible. Bump
  # deliberately when you want to pick up upstream changes.
  RELEASE_PLZ_VERSION: "0.3.157"

jobs:
  # Runs after the release PR merges. Tags the commit, creates the
  # GitHub release, and runs `cargo publish` on every crate whose
  # version is newer than what's on crates.io.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install system dependencies
        # rust-rocksdb's build script needs libclang via bindgen.
        # protoc is vendored through protoc-bin-vendored in meshdb-rpc.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libclang-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install release-plz
        uses: taiki-e/install-action@v2
        with:
          tool: release-plz@${{ env.RELEASE_PLZ_VERSION }}

      - name: Configure git identity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          viewer=$(gh api graphql -f query='query { viewer { name login databaseId }}' --jq '.data.viewer')
          name=$(jq --raw-output '.name // .login' <<< "$viewer")
          login=$(jq --raw-output '.login' <<< "$viewer")
          db_id=$(jq --raw-output '.databaseId' <<< "$viewer")
          git config --global user.name  "$name"
          git config --global user.email "${db_id}+${login}@users.noreply.github.com"

      - name: Run release-plz release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # Wrapper around `release-plz release` that works around an
          # upstream bug in multi-crate workspaces with a shared
          # `git_tag_name`. release-plz creates a fresh annotated tag
          # object per crate (content-hashed with the crate-specific
          # message), then POSTs the shared `refs/tags/<version>`
          # ref. The first crate succeeds; every later crate gets
          # HTTP 422 "Reference already exists" and release-plz
          # aborts. See `crates/release_plz_core/src/command/release.rs`
          # (tag_exists guard is local-only via `git tag -l`) and
          # `crates/release_plz_core/src/git/forge.rs` (422 handler).
          #
          # Each failing iteration still succeeds in running
          # `cargo publish` for one more crate before the tag POST, so
          # retrying makes incremental forward progress. Cap at enough
          # iterations to drain the workspace plus a safety margin.
          max_iterations=15
          iteration=0
          while (( iteration < max_iterations )); do
            iteration=$(( iteration + 1 ))
            echo "::group::release-plz release (attempt $iteration/$max_iterations)"
            stderr_file=$(mktemp)
            set +e
            release-plz release --git-token "$GITHUB_TOKEN" -o json 2> "$stderr_file"
            rc=$?
            set -e
            cat "$stderr_file" >&2
            err=$(cat "$stderr_file")
            rm -f "$stderr_file"
            echo "::endgroup::"
            if (( rc == 0 )); then
              echo "release-plz release finished cleanly after $iteration attempt(s)."
              exit 0
            fi
            if [[ "$err" == *"Reference already exists"* ]]; then
              echo "::warning::release-plz hit the shared-tag 422 bug; retrying."
              continue
            fi
            echo "::error::release-plz release failed with an unrelated error."
            exit 1
          done
          echo "::error::release-plz release did not converge in $max_iterations attempts."
          exit 1

  # Runs on every push to main. Opens (or updates) a single Release PR
  # with the next version bump and the changelog diff; merging that PR
  # triggers the release job above.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libclang-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install release-plz
        uses: taiki-e/install-action@v2
        with:
          tool: release-plz@${{ env.RELEASE_PLZ_VERSION }}

      - name: Configure git identity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          viewer=$(gh api graphql -f query='query { viewer { name login databaseId }}' --jq '.data.viewer')
          name=$(jq --raw-output '.name // .login' <<< "$viewer")
          login=$(jq --raw-output '.login' <<< "$viewer")
          db_id=$(jq --raw-output '.databaseId' <<< "$viewer")
          git config --global user.name  "$name"
          git config --global user.email "${db_id}+${login}@users.noreply.github.com"

      - name: Run release-plz release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # GitHub occasionally returns HTTP 422 for no-op release-pr
          # calls. Treat that as "nothing to create" rather than
          # failing the whole job.
          stderr_file=$(mktemp)
          set +e
          release-plz release-pr \
              --git-token "$GITHUB_TOKEN" \
              --repo-url "https://github.com/$GITHUB_REPOSITORY" \
              -o json 2> "$stderr_file"
          rc=$?
          set -e
          cat "$stderr_file" >&2
          err=$(cat "$stderr_file")
          rm -f "$stderr_file"
          if (( rc == 0 )); then
            exit 0
          fi
          if [[ "$err" == *"422"* ]]; then
            echo "::warning::release-plz release-pr failed with HTTP 422; continuing with no PRs created."
            exit 0
          fi
          exit 1
