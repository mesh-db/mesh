name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs when a new commit lands on the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Fail the build on any compiler warning. The workspace is currently
  # warning-clean; flip this off if a dependency update introduces noise
  # you want to land before fixing.
  RUSTFLAGS: -D warnings

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        # rust-rocksdb uses bindgen, which needs libclang at build time.
        # protoc is vendored through `protoc-bin-vendored` in meshdb-rpc's
        # build.rs, so we deliberately don't install protoc here.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libclang-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        # Caches ~/.cargo/{registry,git} and target/ keyed on the
        # Cargo.toml + Cargo.lock hashes. Cuts cold-build time from
        # minutes to seconds on subsequent runs.
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        # Runs in seconds and doesn't need the cargo cache, so we put it
        # before the build to fail fast on a stray unformatted change.
        run: cargo fmt --all -- --check

      - name: Build workspace (including tests)
        run: cargo build --workspace --all-targets

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Run tests (all features)
        # `meshdb-server`'s default feature set doesn't flip on its
        # own `apoc-load` / `apoc-export` / `apoc-trigger` sub-features
        # (only the executor's, transitively). An `--all-features`
        # pass guards against feature-gated code rotting in the
        # server crate, which the default build can't see.
        run: cargo test --workspace --all-targets --all-features

      - name: Run full openCypher TCK
        # The default meshdb-tck invocation above only runs Match1.feature
        # (the smoke-test fixture). This step points TCK_FEATURES at the
        # whole vendored feature directory so every scenario in the TCK
        # gets exercised. Release mode keeps the run under a minute
        # (debug-mode the pest-generated parser hits its ~2MB thread
        # stack on deeper expressions).
        env:
          TCK_FEATURES: ${{ github.workspace }}/tck/opencypher/tck/features
        run: cargo test --release -p meshdb-tck --test tck

  driver-matrix-python:
    name: Driver matrix (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run after the Rust test job — driver-matrix burn isn't worth it on
    # a tree that doesn't compile or fails its in-tree tests.
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libclang-dev openssl

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build meshdb-server (release)
        # Release binary so the listener latency is realistic — debug
        # builds add 10–20ms per RUN, which masks driver timeouts on
        # CPU-starved CI runners.
        run: cargo build --release -p meshdb-server

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python driver
        # Pinned to drivers/python/requirements.txt so a driver upgrade
        # is an explicit commit, not a silent green-to-flaky shift.
        run: |
          python -m venv drivers/python/.venv
          drivers/python/.venv/bin/pip install -q -r drivers/python/requirements.txt

      - name: Matrix cell — baseline (bolt=5.4, auth=none, tls=off)
        # Per-PR matrix runs two cells per driver: the default
        # bolt=5.4 plaintext path and the "real deployment" shape
        # with basic auth + self-signed TLS. The nightly full-axis
        # workflow (driver-matrix-full.yml) covers the Bolt version
        # axis and every combination beyond this pair.
        env:
          PATH: ${{ github.workspace }}/drivers/python/.venv/bin:${{ env.PATH }}
        run: drivers/run-matrix.sh --lang=py --auth=none --tls=off --bolt=5.4

      - name: Matrix cell — production shape (bolt=5.4, auth=basic, tls=on)
        env:
          PATH: ${{ github.workspace }}/drivers/python/.venv/bin:${{ env.PATH }}
        run: drivers/run-matrix.sh --lang=py --auth=basic --tls=on --bolt=5.4

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: driver-matrix-python-logs
          path: drivers/.run/logs/
          if-no-files-found: ignore

  driver-matrix-js:
    name: Driver matrix (JS)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libclang-dev openssl

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build meshdb-server (release)
        run: cargo build --release -p meshdb-server

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS driver
        # Pinned to drivers/js/package.json so a driver upgrade is
        # an explicit commit.
        run: npm install --prefix drivers/js

      - name: Matrix cell — baseline (bolt=5.4, auth=none, tls=off)
        run: drivers/run-matrix.sh --lang=js --auth=none --tls=off --bolt=5.4

      - name: Matrix cell — production shape (bolt=5.4, auth=basic, tls=on)
        run: drivers/run-matrix.sh --lang=js --auth=basic --tls=on --bolt=5.4

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: driver-matrix-js-logs
          path: drivers/.run/logs/
          if-no-files-found: ignore

  driver-matrix-go:
    name: Driver matrix (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libclang-dev openssl

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build meshdb-server (release)
        run: cargo build --release -p meshdb-server

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: drivers/go/go.sum

      - name: Fetch Go driver
        run: (cd drivers/go && go mod download)

      - name: Matrix cell — baseline (bolt=5.4, auth=none, tls=off)
        run: drivers/run-matrix.sh --lang=go --auth=none --tls=off --bolt=5.4

      - name: Matrix cell — production shape (bolt=5.4, auth=basic, tls=on)
        run: drivers/run-matrix.sh --lang=go --auth=basic --tls=on --bolt=5.4

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: driver-matrix-go-logs
          path: drivers/.run/logs/
          if-no-files-found: ignore

  driver-matrix-java:
    name: Driver matrix (Java)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libclang-dev openssl

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build meshdb-server (release)
        run: cargo build --release -p meshdb-server

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Matrix cell — baseline (bolt=5.4, auth=none, tls=off)
        run: drivers/run-matrix.sh --lang=java --auth=none --tls=off --bolt=5.4

      - name: Matrix cell — production shape (bolt=5.4, auth=basic, tls=on)
        run: drivers/run-matrix.sh --lang=java --auth=basic --tls=on --bolt=5.4

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: driver-matrix-java-logs
          path: drivers/.run/logs/
          if-no-files-found: ignore
